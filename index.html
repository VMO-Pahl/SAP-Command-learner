<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAP Command Learner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background-color: #f5f5f5; 
      color: #333;
    }
    .sap-container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .sap-header {
      background-color: #003399;
      color: white;
      padding: 12px 20px;
      border-radius: 2px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .sap-header h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
    }
    .sap-badge {
      background-color: #ff6600;
      color: white;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
      font-weight: 600;
    }
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .sap-input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #999;
      font-size: 14px;
      background-color: white;
      border-radius: 2px;
    }
    .sap-button {
      padding: 10px 24px;
      background-color: #003399;
      color: white;
      border: none;
      font-size: 14px;
      cursor: pointer;
      border-radius: 2px;
      font-weight: 600;
    }
    .sap-button:hover {
      background-color: #001f4d;
    }
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .sap-card {
      background-color: white;
      border: 1px solid #ddd;
      border-radius: 2px;
      padding: 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .command-title {
      font-weight: 600;
      font-size: 14px;
      color: #003399;
      margin-bottom: 8px;
    }
    .command-text {
      font-family: 'Courier New', monospace;
      background-color: #f9f9f9;
      padding: 10px;
      border-left: 3px solid #ff6600;
      margin-bottom: 12px;
      font-size: 12px;
      word-break: break-all;
      color: #333;
      border-radius: 2px;
    }
    .command-description {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
    }
    .command-actions {
      display: flex;
      gap: 8px;
    }
    .sap-button.icon-button {
      flex: 1;
      padding: 8px 12px;
      font-size: 12px;
      background-color: #f0f0f0;
      color: #333;
      border: 1px solid #ddd;
    }
    .sap-button.icon-button.positive {
      background-color: #e8f5e9;
      color: #2e7d32;
      border-color: #4caf50;
    }
    .sap-button.icon-button.negative {
      background-color: #ffebee;
      color: #c62828;
      border-color: #ef5350;
    }
    .loading {
      text-align: center;
      padding: 40px 20px;
      color: #999;
      font-size: 16px;
    }
    .lexicon-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-box {
      background-color: white;
      border: 1px solid #ddd;
      padding: 12px;
      border-radius: 2px;
      text-align: center;
    }
    .stat-label {
      font-size: 12px;
      color: #999;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 600;
      color: #003399;
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="sap-container">
    <div class="sap-header">
      <h1>📚 SAP Command Learner</h1>
      <span class="sap-badge">BETA</span>
    </div>

    <div class="input-group">
      <input 
        type="text" 
        id="questionInput" 
        class="sap-input" 
        placeholder="Z.B.: Wie erstelle ich einen neuen Benutzer?"
      >
      <button class="sap-button" onclick="generateCommands()">Suchen</button>
    </div>

    <div id="stats" class="lexicon-stats"></div>
    <div id="results"></div>
    <div id="lexiconSection"></div>
  </div>

  <script>
    // Globale Variablen
    let lexicon = [];
    let currentResults = [];
    let currentFilter = 'all';

    // Laden beim Start
    loadLexicon();
    updateStats();

    async function generateCommands() {
      const question = document.getElementById('questionInput').value.trim();
      
      if (!question) {
        alert('Bitte gib eine Frage ein!');
        return;
      }

      console.log('🔍 Starte Suche für:', question);
      
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<div class="loading">⏳ Befehle werden generiert...</div>';

      try {
        // API URL bestimmen
        let apiUrl;
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
          apiUrl = 'http://localhost:3001/api/generate-commands';
        } else {
          apiUrl = 'https://sap-command-learner.vercel.app/api/generate-commands';
        }

        console.log('📡 Sende Anfrage an:', apiUrl);

        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            question: question
          })
        });

        console.log('📦 Response Status:', response.status);

        if (!response.ok) {
          throw new Error(`API Error: ${response.status}`);
        }

        const data = await response.json();
        console.log('✅ Daten erhalten:', data);

        const commands = data.commands || [];

        // Zu Lexikon hinzufügen
        commands.forEach(cmd => {
          const existing = lexicon.find(c => c.command === cmd.command);
          if (existing) {
            existing.searches = (existing.searches || 0) + 1;
          } else {
            lexicon.push({
              ...cmd,
              positive: 0,
              negative: 0,
              searches: 1
            });
          }
        });

        // Sortieren
        lexicon.sort((a, b) => {
          const scoreA = (a.positive || 0) - (a.negative || 0);
          const scoreB = (b.positive || 0) - (b.negative || 0);
          return scoreB - scoreA;
        });

        saveLexicon();
        currentResults = commands;

        // Anzeigen
        displayResults(commands);
        updateStats();
        displayLexicon();

      } catch (err) {
        console.error('❌ FEHLER:', err);
        resultsDiv.innerHTML = `<div class="empty-state"><p>❌ Fehler: ${err.message}</p></div>`;
      }
    }

    function displayResults(commands) {
      const resultsDiv = document.getElementById('results');
      
      if (commands.length === 0) {
        resultsDiv.innerHTML = '<div class="empty-state"><p>Keine Befehle gefunden</p></div>';
        return;
      }

      let html = `<h3 style="margin-bottom: 12px; font-size: 14px; color: #333;">Vorschläge:</h3><div class="results-grid">`;
      
      commands.forEach((cmd, idx) => {
        const lexEntry = lexicon.find(l => l.command === cmd.command);
        const score = lexEntry ? (lexEntry.positive || 0) - (lexEntry.negative || 0) : 0;

        html += `
          <div class="sap-card">
            <div class="command-title">${escapeHtml(cmd.command)}</div>
            <div class="command-text">${escapeHtml(cmd.command)}</div>
            <div class="command-description">${escapeHtml(cmd.description)}</div>
            ${lexEntry ? `<div style="font-size: 11px; color: #999; margin-bottom: 12px;">Score: ${score > 0 ? '+' : ''}${score}</div>` : ''}
            <div class="command-actions">
              <button class="sap-button icon-button positive" onclick="rateFeedback('${escapeQuote(cmd.command)}', true)">✓ OK</button>
              <button class="sap-button icon-button" onclick="copyToClipboard('${escapeQuote(cmd.command)}')">📋</button>
              <button class="sap-button icon-button negative" onclick="rateFeedback('${escapeQuote(cmd.command)}', false)">✗ Nein</button>
            </div>
          </div>
        `;
      });

      html += '</div>';
      resultsDiv.innerHTML = html;
    }

    function displayLexicon() {
      const lexDiv = document.getElementById('lexiconSection');

      if (lexicon.length === 0) {
        lexDiv.innerHTML = '';
        return;
      }

      const filtered = lexicon.filter(cmd => {
        const score = (cmd.positive || 0) - (cmd.negative || 0);
        if (currentFilter === 'positive') return score > 0;
        if (currentFilter === 'negative') return score < 0;
        return true;
      });

      let html = `
        <h3 style="margin-top: 32px; margin-bottom: 12px; font-size: 14px; color: #333;">Dein Lexikon (${lexicon.length})</h3>
        <div style="display: flex; gap: 8px; margin-bottom: 20px;">
          <button class="sap-button" style="background-color: ${currentFilter === 'all' ? '#003399' : '#e0e0e0'}; color: ${currentFilter === 'all' ? 'white' : '#333'};" onclick="setFilter('all')">Alle</button>
          <button class="sap-button" style="background-color: ${currentFilter === 'positive' ? '#2e7d32' : '#e0e0e0'}; color: ${currentFilter === 'positive' ? 'white' : '#333'};" onclick="setFilter('positive')">✓ Funktionieren</button>
          <button class="sap-button" style="background-color: ${currentFilter === 'negative' ? '#c62828' : '#e0e0e0'}; color: ${currentFilter === 'negative' ? 'white' : '#333'};" onclick="setFilter('negative')">✗ Fehler</button>
          <button class="sap-button" style="background-color: #e0e0e0; color: #333;" onclick="resetLexicon()">🗑️ Zurücksetzen</button>
        </div>
        <div class="results-grid">
      `;

      filtered.forEach(cmd => {
        const score = (cmd.positive || 0) - (cmd.negative || 0);
        html += `
          <div class="sap-card">
            <div class="command-title">${escapeHtml(cmd.command)}</div>
            <div class="command-text">${escapeHtml(cmd.command)}</div>
            <div class="command-description">${escapeHtml(cmd.description)}</div>
            <div style="font-size: 11px; color: #999; margin-bottom: 12px;">Score: <strong style="color: ${score > 0 ? '#2e7d32' : score < 0 ? '#c62828' : '#999'};">${score > 0 ? '+' : ''}${score}</strong> (${cmd.positive || 0} ✓ / ${cmd.negative || 0} ✗)</div>
            <div class="command-actions">
              <button class="sap-button icon-button positive" onclick="rateFeedback('${escapeQuote(cmd.command)}', true)">✓</button>
              <button class="sap-button icon-button" onclick="copyToClipboard('${escapeQuote(cmd.command)}')">📋</button>
              <button class="sap-button icon-button negative" onclick="rateFeedback('${escapeQuote(cmd.command)}', false)">✗</button>
            </div>
          </div>
        `;
      });

      html += '</div>';
      lexDiv.innerHTML = html;
    }

    function rateFeedback(command, isPositive) {
      const cmd = lexicon.find(c => c.command === command);
      if (cmd) {
        if (isPositive) {
          cmd.positive = (cmd.positive || 0) + 1;
        } else {
          cmd.negative = (cmd.negative || 0) + 1;
        }
        saveLexicon();
        updateStats();
        displayResults(currentResults);
        displayLexicon();
      }
    }

    function setFilter(filter) {
      currentFilter = filter;
      displayLexicon();
    }

    function resetLexicon() {
      if (confirm('Möchtest du das Lexikon wirklich löschen?')) {
        lexicon = [];
        currentResults = [];
        saveLexicon();
        updateStats();
        document.getElementById('results').innerHTML = '';
        document.getElementById('lexiconSection').innerHTML = '';
      }
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('✓ Kopiert!');
      });
    }

    function updateStats() {
      const stats = {
        total: lexicon.length,
        positive: lexicon.filter(c => ((c.positive || 0) - (c.negative || 0)) > 0).length,
        negative: lexicon.filter(c => ((c.positive || 0) - (c.negative || 0)) < 0).length
      };

      const statsDiv = document.getElementById('stats');
      statsDiv.innerHTML = `
        <div class="stat-box">
          <div class="stat-label">Befehle gelernt</div>
          <div class="stat-value">${stats.total}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">✓ Funktionieren</div>
          <div class="stat-value" style="color: #2e7d32;">${stats.positive}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">✗ Fehler</div>
          <div class="stat-value" style="color: #c62828;">${stats.negative}</div>
        </div>
      `;
    }

    function saveLexicon() {
      try {
        localStorage.setItem('sap-lexicon', JSON.stringify(lexicon));
        console.log('✓ Lexikon gespeichert');
      } catch (err) {
        console.error('Fehler beim Speichern:', err);
      }
    }

    function loadLexicon() {
      try {
        const saved = localStorage.getItem('sap-lexicon');
        if (saved) {
          lexicon = JSON.parse(saved);
          console.log('✓ Lexikon geladen:', lexicon.length, 'Befehle');
        }
      } catch (err) {
        console.error('Fehler beim Laden:', err);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function escapeQuote(text) {
      return text.replace(/'/g, "\\'");
    }

    // Enter-Taste für Suche
    document.getElementById('questionInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        generateCommands();
      }
    });
  </script>
</body>
</html>
